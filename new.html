<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primeiro arquivo HTML</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f5f7fb;
      color: #111;
    }
    main {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin-top: 0;
      color: #0f172a;
    }
    p {
      line-height: 1.75;
    }
    button {
      margin-top: 1rem;
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 9999px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    .about-section {
    max-width: 1900px;
    margin: 2rem auto;
    background: #121c3d;
    padding: 2rem;
    border-radius: 1rem;
    box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
}

.about-section h2 {
    color: white;
    margin-top: 0;
}

.about {
    color: lightblue;
    line-height: 1.75;
}

footer {
margin-top: 30rem;
    color: white;
    padding: 1rem;
    text-align: center;
    }


  </style>
</head>
<body>
  <main>
    <h1>Bem-vindo à minha primeira página HTML</h1>
    <p>Este é o meu primeiro arquivo HTML. Estou aprendendo a criar páginas web, JavaScript e afins.</p>
    <button id="greet">Click</button>

  </main>
<section class="about-section">
  <h2>Sobre mim</h2>

  <p class="about">
    Cursando Análise e Desenvolvimento de Sistemas.
  </p>

  <p class="about">
    Atualmente estudando HTML, CSS e JavaScript.
  </p>
</section>
<footer>
  <p style="text-align: center; color: #0f172a;">&copy; 2026 Ridley Lima. Todos os direitos reservados.</p>
</footer>

  <script>
    document.getElementById('greet').addEventListener('click', function() {
      alert('Meu nome é Ridley e estarei me esforçando para aprender o máximo possível sobre desenvolvimento web e programação. Obrigado por visitar minha página!');
    });
  </script>
</body>
</html>
