<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New HTML Document</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f5f7fb;
      color: #111;
    }
    main {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin-top: 0;
      color: #0f172a;
    }
    p {
      line-height: 1.75;
    }
    button {
      margin-top: 1rem;
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 9999px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Bem-vindo à minha primeira página HTML</h1>
    <p>Este é o meu primeiro arquivo HTML. Estou aprendendo a criar páginas web, JavaScript e afins.</p>
    <button id="greet">Click</button>
  </main>
  <script>
    document.getElementById('greet').addEventListener('click', function() {
      alert('Meu nome é Ridley e estarei me esforçando para aprender o máximo possível sobre desenvolvimento web e programação. Obrigado por visitar minha página!g');
    });
  </script>
</body>
</html>
